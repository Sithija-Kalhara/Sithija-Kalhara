name: Waka Readme

on:
  schedule:
    # හැමදාම රෑ 12ට ඔටෝ රන් වෙන්න (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # ඕන වෙලාවක මැන්වල් රන් කරන්න

permissions:
  contents: write # README එක අප්ඩේට් කරන්න මේ අවසරය අනිවාර්යයි

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      # 1. Repo එක checkout කරගන්නවා
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. වඩාත් ස්ථාවර අලුත්ම WakaTime Stats Action එක රන් කරනවා
      - name: Update WakaTime Stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TITLE: true
          SECTION_NAME: waka
