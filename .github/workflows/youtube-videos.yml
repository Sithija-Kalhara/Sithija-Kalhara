name: Update YouTube Latest Video

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 6AM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write         # README එක update කරලා push කරන්න

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest video without API Key
        run: |
          python3 - <<'EOF'
          import requests
          import xml.etree.ElementTree as ET
          import re
          import sys

          # Mr. Flexy Channel ID
          channel_id = "UCFK9phR6Au3AVhUw95n71fQ"
          
          # Replace 'UC' with 'UU' to get standard video uploads ONLY (No Shorts/Reels)
          playlist_id = "UUFK9phR6Au3AVhUw95n71fQ"
          
          # Correct YouTube Playlist Feed URL
          feed_urls = [
              f"https://www.youtube.com/feeds/videos.xml?playlist_id={playlist_id}",
              f"https://api.allorigins.win/raw?url=https://www.youtube.com/feeds/videos.xml?playlist_id={playlist_id}"
          ]

          response = None
          for url in feed_urls:
              try:
                  print(f"Trying to fetch feed from: {url}")
                  res = requests.get(url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=10)
                  if res.status_code == 200:
                      response = res
                      print("✅ Successfully fetched feed!")
                      break
                  else:
                      print(f"⚠️ Failed with status code: {res.status_code}")
              except Exception as e:
                  print(f"⚠️ Error occurred: {e}")

          if response is None:
              print("❌ All feed sources failed! Cannot fetch RSS Feed.")
              sys.exit(1)

          try:
              root = ET.fromstring(response.content)
          except Exception as e:
              print(f"❌ Failed to parse XML: {e}")
              sys.exit(1)
          
          # XML Namespaces
          namespaces = {
              'atom': 'http://www.w3.org/2005/Atom',
              'yt': 'http://www.youtube.com/xml/schemas/2015',
              'media': 'http://search.yahoo.com/mrss/'
          }

          # Get the first entry (Latest Video)
          entry = root.find('atom:entry', namespaces)
          if entry is None:
              print("❌ No videos found in the feed!")
              sys.exit(1)

          video_id = entry.find('yt:videoId', namespaces).text
          title = entry.find('atom:title', namespaces).text
          date = entry.find('atom:published', namespaces).text[:10]
          link = f"https://www.youtube.com/watch?v={video_id}"
          
          # Thumbnail Link
          thumb = f"https://img.youtube.com/vi/{video_id}/hqdefault.jpg"

          # URL Encode title for shields.io badge
          clean_title = re.sub(r'[^a-zA-Z0-9 ]', '', title)[:30]
          badge_title = clean_title.replace(' ', '%20')

          # Build Card Markdown
          card = f"""<div align="center">
            <a href="{link}" target="_blank">
              <img src="{thumb}" alt="{title}" width="480" style="border-radius:12px;" />
            </a>
            <br/>
            <br/>
            <br/>
            <a href="{link}" target="_blank">
              <img src="https://img.shields.io/badge/▶ Watch Now-{badge_title}-FF0000?style=for-the-badge&logo=youtube&logoColor=white" />
            </a>
            <br/>
            <br/>
            <sub>📅 Published: {date}</sub>
          </div>"""

          # Read README
          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          # 🌟 [BULLETPROOF UPDATE] Matches any spaces between comment markers
          pattern = r"()(.*?)()"
          
          # Rebuild tags dynamically using captured groups (\1 and \3) to preserve user's exact spacing style!
          replacement = f"\\1\n{card}\n\\3"

          if not re.search(pattern, content, flags=re.DOTALL):
              print("❌ ERROR: Tags 'YOUTUBE_VIDEO_START' or 'YOUTUBE_VIDEO_END' not found in README.md!")
              sys.exit(1)

          new_content = re.sub(
              pattern,
              replacement,
              content,
              flags=re.DOTALL,
          )

          # Write README
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print(f"✅ README successfully updated with standard video: {title}")
          EOF

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🎬 chore: update latest standard YouTube video"
          git push
