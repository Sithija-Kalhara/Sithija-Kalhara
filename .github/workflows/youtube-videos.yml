name: Update YouTube Latest Video

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 6AM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write         # README එක update කරලා push කරන්න

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest video without API Key
        run: |
          python3 - <<'EOF'
          import requests
          import xml.etree.ElementTree as ET
          import re

          # Mr. Flexy Channel ID
          channel_id = "UCFK9phR6Au3AVhUw95n71fQW"
          feed_url = f"https://www.youtube.com/feeds/videos.xml?channel_id={channel_id}"

          response = requests.get(feed_url)
          if response.status_code != 200:
              print(f"❌ Cannot fetch RSS Feed! Status code: {response.status_code}")
              exit(1)

          root = ET.fromstring(response.content)
          
          # XML Namespaces
          namespaces = {
              'atom': 'http://www.w3.org/2005/Atom',
              'yt': 'http://www.youtube.com/xml/schemas/2015',
              'media': 'http://search.yahoo.com/mrss/'
          }

          # Get the first entry (Latest Video)
          entry = root.find('atom:entry', namespaces)
          if entry is None:
              print("❌ No videos found in the feed!")
              exit(1)

          video_id = entry.find('yt:videoId', namespaces).text
          title = entry.find('atom:title', namespaces).text
          date = entry.find('atom:published', namespaces).text[:10]
          link = f"https://www.youtube.com/watch?v={video_id}"
          
          # Thumbnail Link
          thumb = f"https://img.youtube.com/vi/{video_id}/hqdefault.jpg"

          # URL Encode title for shields.io badge
          clean_title = re.sub(r'[^a-zA-Z0-9 ]', '', title)[:30]
          badge_title = clean_title.replace(' ', '%20')

          # Build Card Markdown
          card = f"""<div align="center">
            <a href="{link}" target="_blank">
              <img src="{thumb}" alt="{title}" width="480" style="border-radius:12px;" />
            </a>
            <br/>
            <br/>
            <a href="{link}" target="_blank">
              <img src="https://img.shields.io/badge/▶ Watch Now-{badge_title}-FF0000?style=for-the-badge&logo=youtube&logoColor=white" />
            </a>
            <br/>
            <sub>📅 Published: {date}</sub>
          </div>
          """

          # Read and Update README
          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_content = re.sub(
              r".*?",
              card,
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print(f"✅ README successfully updated with video: {title}")
          EOF

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🎬 chore: update latest YouTube video"
          git push
