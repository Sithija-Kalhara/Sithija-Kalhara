name: Update YouTube Latest Video

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest video without API Key
        run: |
          python3 - <<'EOF'
          import requests
          import xml.etree.ElementTree as ET
          import re
          import sys
          import os

          print("--- 🚀 DEBUG START ---")

          # 1. Check README.md exists
          if not os.path.exists("README.md"):
              print("❌ ERROR: README.md does not exist in current directory!")
              sys.exit(1)
          else:
              print("✅ Found README.md")

          # Mr. Flexy Channel ID
          playlist_id = "UUFK9phR6Au3AVhUw95n71fQ"
          url = f"https://www.youtube.com/feeds/videos.xml?playlist_id={playlist_id}"
          
          print(f"🔗 Target Feed URL: {url}")

          # 2. Fetch API Feed
          try:
              res = requests.get(url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=15)
              print(f"📡 HTTP Response Code: {res.status_code}")
              if res.status_code != 200:
                  print("❌ Error: Failed to fetch RSS feed.")
                  sys.exit(1)
              xml_data = res.content
              print("✅ XML Feed Fetched Successfully!")
          except Exception as e:
              print(f"❌ Connection Error: {e}")
              sys.exit(1)

          # 3. Parse XML
          try:
              root = ET.fromstring(xml_data)
              print("✅ XML Parsed Successfully!")
          except Exception as e:
              print(f"❌ XML Parsing Failed: {e}")
              sys.exit(1)

          namespaces = {
              'atom': 'http://www.w3.org/2005/Atom',
              'yt': 'http://www.youtube.com/xml/schemas/2015'
          }

          # 4. Get Latest Video Details
          entry = root.find('atom:entry', namespaces)
          if entry is None:
              print("❌ XML Error: No '<entry>' elements found in RSS!")
              sys.exit(1)

          try:
              video_id = entry.find('yt:videoId', namespaces).text
              title = entry.find('atom:title', namespaces).text
              date = entry.find('atom:published', namespaces).text[:10]
              link = f"https://www.youtube.com/watch?v={video_id}"
              print(f"🎥 Latest Video Title: {title}")
              print(f"🆔 Video ID: {video_id}")
          except Exception as e:
              print(f"❌ Error extracting video metadata: {e}")
              sys.exit(1)

          # Build Video Card
          thumb = f"https://img.youtube.com/vi/{video_id}/hqdefault.jpg"
          clean_title = re.sub(r'[^a-zA-Z0-9 ]', '', title)[:30]
          badge_title = clean_title.replace(' ', '%20')

          card = f"""<div align="center">
            <a href="{link}" target="_blank">
              <img src="{thumb}" alt="{title}" width="480" style="border-radius:12px;" />
            </a>
            <br/>
            <br/>
            <br/>
            <a href="{link}" target="_blank">
              <img src="https://img.shields.io/badge/▶ Watch Now-{badge_title}-FF0000?style=for-the-badge&logo=youtube&logoColor=white" />
            </a>
            <br/>
            <br/>
            <sub>📅 Published: {date}</sub>
          </div>"""

          # 5. Read and Regex Match README
          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          # Print README length to make sure it's not empty
          print(f"📄 Readme length: {len(content)} characters.")

          # Regex pattern matching tags with any spacing
          pattern = r"(<!--\s*YOUTUBE_VIDEO_START\s*-->)(.*?)(<!--\s*YOUTUBE_VIDEO_END\s*-->)"
          
          match = re.search(pattern, content, flags=re.DOTALL)
          if match:
              print("✅ Tags FOUND in README!")
              print(f"🔍 Current Content inside tags: {repr(match.group(2))}")
          else:
              print("❌ ERROR: Tags 'YOUTUBE_VIDEO_START' or 'YOUTUBE_VIDEO_END' NOT FOUND in README.md!")
              print("Please make sure you have <!-- YOUTUBE_VIDEO_START --> and <!-- YOUTUBE_VIDEO_END --> in README.md")
              sys.exit(1)

          replacement = f"\\1\n{card}\n\\3"
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          # 6. Write Back to README
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)
          print("💾 README.md overwritten successfully with updated video.")

          print("--- 🏁 DEBUG END ---")
          EOF

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "ℹ️ No changes detected in README.md. Nothing to commit."
          else
            git commit -m "🎬 chore: update latest standard YouTube video"
            git push
            echo "🚀 Successfully pushed changes to repository!"
          fi
