name: Refresh Dev Quotes
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: lowlighter/metrics@latest 
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          plugin_languages: yes
          plugin_quotes: yes 
